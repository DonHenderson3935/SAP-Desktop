apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: ewp-tls
  namespace: istio-system
spec:
  secretName: ewp-tls
  duration: 2160h
  renewBefore: 360h
  issuerRef:
    name: kyma-gateway-issuer
    kind: ClusterIssuer
  dnsNames:
    - "ewp.${TEST_DOMAIN}"
  usages:
    - server auth
    - client auth
