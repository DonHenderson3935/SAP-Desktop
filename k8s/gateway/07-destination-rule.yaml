apiVersion: networking.istio.io/v1beta1
kind: DestinationRule
metadata:
  name: ewp-server-dr
  namespace: ewp
spec:
  host: ewp-server.ewp.svc.cluster.local
  trafficPolicy:
    connectionPool:
      http:
        http2MaxRequests: 1000
        maxRequestsPerConnection: 0
        h2UpgradePolicy: UPGRADE
      tcp:
        maxConnections: 100
        connectTimeout: 5s
    tls:
      mode: ISTIO_MUTUAL
    loadBalancer:
      simple: LEAST_CONN
    outlierDetection:
      consecutive5xxErrors: 5
      interval: 10s
      baseEjectionTime: 30s
  subsets:
    - name: grpc-upstream
      labels:
        app: ewp-server
      trafficPolicy:
        connectionPool:
          http:
            h2UpgradePolicy: UPGRADE
