apiVersion: apps/v1
kind: Deployment
metadata:
  name: echo-h2
  namespace: network-test
  labels:
    app: echo-h2
    version: v1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: echo-h2
  template:
    metadata:
      labels:
        app: echo-h2
        version: v1
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
    spec:
      containers:
        - name: echo-server
          image: ghcr.io/GITHUB_ORG/ewp-kyma/echo-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: http
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: echo-h2
  namespace: network-test
  labels:
    app: echo-h2
  annotations:
    # Istio will negotiate H2 (HTTP/2) with this backend
    service.istio.io/canonical-name: echo-h2
spec:
  selector:
    app: echo-h2
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
