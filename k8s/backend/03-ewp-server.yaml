apiVersion: apps/v1
kind: Deployment
metadata:
  name: ewp-server
  namespace: ewp
  labels:
    app: ewp-server
    version: v1
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ewp-server
  template:
    metadata:
      labels:
        app: ewp-server
        version: v1
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: ewp-server
          image: ghcr.io/GITHUB_ORG/ewp-kyma/ewp-server:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
              name: grpc
              protocol: TCP
          env:
            - name: PORT
              value: "8080"
            - name: GRPC_SERVICE
              value: "api"
            - name: UUID
              value: "d342d11e-d424-4583-b36e-524ab1f0afa4"
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 30
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 65532
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
      volumes:
        - name: tmp
          emptyDir: {}
      securityContext:
        seccompProfile:
          type: RuntimeDefault
---
apiVersion: v1
kind: Service
metadata:
  name: ewp-server
  namespace: ewp
  labels:
    app: ewp-server
spec:
  selector:
    app: ewp-server
  ports:
    - name: grpc
      port: 8080
      targetPort: 8080
      protocol: TCP
  type: ClusterIP
